<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ماسح الدخول 🔍</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #1a1a1a; color: white; text-align: center; margin: 0; padding: 20px; }
        #reader { width: 100%; max-width: 500px; margin: auto; border: 2px solid #c5a059; border-radius: 15px; overflow: hidden; background: #000; }
        #result { margin-top: 20px; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 18px; }
        .success { background: #27ae60; color: white; }
        .error { background: #e74c3c; color: white; }
        .scanning { background: #34495e; color: #fff; }
    </style>
</head>
<body>

    <h2 style="color:#c5a059">نظام رونق - ماسح الدخول ⚜️</h2>
    <div id="reader"></div>
    <div id="result" class="scanning">بانتظار مسح الكود...</div>
    <button onclick="location.reload()" style="margin-top:20px; padding:10px; border-radius:8px; cursor:pointer;">إعادة تشغيل الكاميرا</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyBycODn3kTe7uRIBYifDogSPmv2towU6lA", 
        projectId: "wedding-system-6fadd", 
        appId: "1:902051092170:web:e228d3138a5b091b974633" 
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // متغير للتحكم في عملية المسح (منع التكرار)
    let isProcessing = false;

    async function onScanSuccess(decodedText) {
        // إذا كان النظام مشغولاً بمعالجة كود حالياً، تجاهل المسحة الجديدة
        if (isProcessing) return;

        isProcessing = true; // تفعيل وضع المعالجة (قفل المسح)
        const resultDiv = document.getElementById('result');
        resultDiv.className = 'scanning';
        resultDiv.innerText = "جاري التحقق من الكود...";

        try {
            const guestRef = doc(db, "v30_guests", decodedText);
            const guestSnap = await getDoc(guestRef);

            if (guestSnap.exists()) {
                const guestData = guestSnap.data();

                if (guestData.status === "تم-الدخول") {
                    resultDiv.className = 'error';
                    resultDiv.innerText = `⚠️ تنبيه: ${guestData.name} مسجل دخوله مسبقاً!`;
                } else {
                    // تحديث الحالة إلى "تم-الدخول"
                    await updateDoc(guestRef, { status: "تم-الدخول" });
                    resultDiv.className = 'success';
                    resultDiv.innerText = `✅ تم دخول: ${guestData.name} بنجاح`;
                    
                    // إصدار صوت تنبيه بسيط (اختياري)
                    const audio = new Audio('https://www.soundjay.com/buttons/sounds/button-3.mp3');
                    audio.play();
                }
            } else {
                resultDiv.className = 'error';
                resultDiv.innerText = "❌ الكود غير صحيح أو غير موجود!";
            }
        } catch (error) {
            resultDiv.className = 'error';
            resultDiv.innerText = "حدث خطأ أثناء الاتصال بالقاعدة";
            console.error(error);
        }

        // الانتظار لمدة 3 ثوانٍ قبل السماح بمسح كود جديد (الهدوء المطلوب)
        setTimeout(() => {
            isProcessing = false;
            if(resultDiv.className !== 'success') {
                resultDiv.innerText = "جاهز لمسح كود جديد...";
                resultDiv.className = 'scanning';
            }
        }, 3000); 
    }

    // إعداد الماسح الضوئي
    const html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
        fps: 10, // عدد الفريمات في الثانية
        qrbox: { width: 250, height: 250 } 
    });
    
    html5QrcodeScanner.render(onScanSuccess);
</script>
</body>
</html>
