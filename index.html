<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>نظام الدعوات الملكي للأعراس</title>
    <meta property="og:title" content="دعوة خاصة لحضور حفل زفاف">
    <meta property="og:description" content="يسعدنا حضوركم ومشاركتنا الفرحة - يرجى الضغط لتأكيد الحضور">
    <meta property="og:image" content="https://raw.githubusercontent.com/abdulrhman9591/wedding-system1/main/preview.jpg"> <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Amiri:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --soft-pink-bg: #fdf2f2;
            --pure-white: #ffffff;
            --rose-gold-text: #e5b3a3;
            --deep-gray-text: #5a5a5a;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--soft-pink-bg);
            color: var(--deep-gray-text);
            margin: 0;
            padding: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 56c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-13-8c4.418 0 8-3.582 8-8s-3.582-8-8-8-8 3.582-8 8 3.582 8 8 8zm66 15c.552 0 1-.448 1-1s-.448-1-1-1-1 .448-1 1 .448 1 1 1z' fill='%23e5b3a3' fill-opacity='0.1' fill-rule='evenodd'/%3E%3C/svg%3E");
        }

        .container { width: 90%; max-width: 1100px; margin: auto; padding: 20px; }
        .hidden { display: none !important; }

        .card {
            background: var(--pure-white);
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
            border: 1px solid rgba(229, 179, 163, 0.2);
            text-align: center;
        }

        h1, h2, h3 { color: var(--rose-gold-text); font-family: 'Amiri', serif; }

        input, select {
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px;
            border: 1px solid #eee; background: #fafafa; box-sizing: border-box;
        }

        button {
            cursor: pointer; padding: 15px 25px; border-radius: 12px; border: none;
            font-weight: bold; transition: 0.3s; width: 100%; font-size: 16px;
        }

        .btn-main { background: var(--rose-gold-text); color: white; box-shadow: 0 4px 15px rgba(229, 179, 163, 0.4); }
        .btn-main:hover { transform: translateY(-2px); opacity: 0.9; }

        .btn-wa { background: #58cc71; color: white; width: auto; padding: 8px 15px; }
        .btn-danger { background: #f8d7da; color: #721c24; width: auto; padding: 8px 15px; }

        .inv-box {
            max-width: 550px; margin: 50px auto; text-align: center;
            border: 3px double var(--rose-gold-text);
            padding: 40px; background: #fff;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        .inv-img { width: 100%; border-radius: 20px; margin-bottom: 25px; border: 5px solid white; }
        .qr-box { background: white; padding: 15px; display: inline-block; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div id="app" class="container">
    
    <div id="login-page" class="card" style="max-width: 450px; margin: 80px auto;">
        <h1>🌸 دخول النظام</h1>
        <input id="user-input" type="text" placeholder="اسم المستخدم">
        <input id="pass-input" type="password" placeholder="كلمة المرور">
        <button class="btn-main" onclick="handleLogin()">دخول</button>
    </div>

    <div id="main-page" class="hidden">
        <div class="card" style="display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin:0">لوحة التحكم</h2>
            <button class="btn-danger" style="width: auto;" onclick="logout()">خروج</button>
        </div>

        <div id="admin-view" class="hidden">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="card">
                    <h3>🎀 تأسيس مناسبة</h3>
                    <input id="c-name" placeholder="اسم العميل">
                    <input id="c-event" placeholder="عنوان المناسبة">
                    <input id="c-img" placeholder="رابط صورة الدعوة">
                    <input id="c-map" placeholder="رابط الخريطة">
                    <button class="btn-main" onclick="addClient()">حفظ</button>
                </div>
                <div class="card">
                    <h3>📝 إضافة ضيوف</h3>
                    <select id="client-select" onchange="loadAdminTable()"></select>
                    <input id="g-name" placeholder="اسم الضيف">
                    <input id="g-phone" placeholder="رقم الجوال">
                    <button class="btn-main" style="background:#8ebf9a" onclick="addGuest()">إضافة</button>
                </div>
            </div>
            <div id="admin-table-container" class="card">
                <h3>📋 قائمة المدعوين</h3>
                <div id="admin-table"></div>
            </div>
        </div>

        <div id="client-view" class="hidden">
            <div class="card">
                <h2 id="client-event-title">إحصائيات المناسبة</h2>
                <div style="display: flex; justify-content: space-around;">
                    <div><h3>حضور: <span id="stat-yes" style="color:#8ebf9a">0</span></h3></div>
                    <div><h3>اعتذار: <span id="stat-no" style="color:#e5b3a3">0</span></h3></div>
                </div>
            </div>
        </div>
    </div>

    <div id="guest-page" class="hidden">
        <div class="inv-box card">
            <h1 id="inv-event">دعوة فرح</h1>
            <img id="inv-img" class="inv-img" src="">
            <h2 id="inv-guest" style="font-family: 'Amiri', serif; font-size: 2.2em;"></h2>
            
            <div id="guest-actions">
                <p>ننتظر حضوركم بكل حب ✨</p>
                <button class="btn-main" style="background:#8ebf9a; margin-bottom:15px;" onclick="updateGuest(true)">تأكيد الحضور ✅</button>
                <button class="btn-main" style="background:#f4f4f4; color: #888;" onclick="updateGuest(false)">اعتذار عن الحضور ❌</button>
            </div>
            
            <div id="guest-final-yes" class="hidden">
                <h2 style="color:#8ebf9a">نسعد جداً بحضوركم!</h2>
                <div id="qrcode" class="qr-box"></div>
                <p>📍 الموقع: <a id="inv-map" href="#" target="_blank" style="color:var(--rose-gold-text);">اضغط هنا للخريطة</a></p>
            </div>
        </div>
    </div>

</div>

<script type="module">
    // (يتم وضع بقية أكواد Firebase والوظائف البرمجية هنا كما في النسخ السابقة)

</script>
</body>
</html>
