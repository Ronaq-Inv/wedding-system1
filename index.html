<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">

    <style>
        /* المتغيرات اللونية الفخمة */
        :root {
            --gold-primary: #d4af37; /* ذهبي معتق */
            --gold-light: #f1e5ac;  /* ذهبي فاتح للإضاءة */
            --bg-dark: #080808;      /* أسود عميق */
            --card-bg: rgba(26, 26, 26, 0.7); /* أسود شفاف للبطاقات */
            --text-main: #e0e0e0;    /* رمادي فاتح للنصوص */
            --border-color: rgba(212, 175, 55, 0.3); /* حواف ذهبية خفيفة */
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            /* خلفية مزخرفة بنقوش نباتية رسمية ذهبية (النقش الفخم المطلوب) */
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI2MDAiIGhlaWdodD0iNjAwIiB2aWV3Qm94PSIwIDAgNjAwIDYwMCI+PHBhdGggZmlsbD0ibm9uZSIgc3Ryb2tlPSIjZDQhZjM3IiBzdHJva2Utd2lkdGg9IjAuNSIgc3Ryb2tlLW9wYWNpdHk9IjAuMTUiIGQ9Ik0wIDZoMTAwdjEwMEgwek0xMDAgMTM2aDEwMHYxMDBIMTAwek0yMDAgMjM2aDEwMHYxMDBIMjAwek0zMDAgMzM2aDEwMHYxMDBIMzAwek00MDAgNDM2aDEwMHYxMDBINDAwek01MDAgNTM2aDEwMHYxMDBINTAweiIvPjxwYXRoIGZpbGw9Im5vbmUiIHN0cm9keT0iI2Q0YWYzNyIgc3Ryb2tlLXdpZHRoPSIwLjciIHN0cm9rZS1vcGFjaXR5PSIwLjIyIiBkPSJNMzAwIDZ2NjAwTTExNiAwaDQ4NE0wIDEzNmg2MDAiLz48ZyBmaWxsPSIjZDQhZjM3IiBmaWxsLW9wYWNpdHk9IjAuMTUiPjxjaXJjbGUgY3g9IjUiIGN5PSI1IiByPSIxLjUiLz48Y2lyY2xlIGN4PSIxMDUiIGN5PSIxMzUiIHI9IjEuNSIzPjxjaXJjbGUgY3g9IjIwNSIgY3k9IjIzNSIgcjPSIxLjUiLz48Y2lyY2xlIGN4PSIzMDUiIGN5PSIzMzUiIHI9IjEuNSIzPjxjaXJjbGUgY3g9IjQwNSIgY3k9IjQzNSIgcjPSIxLjUiLz48Y2lyY2xlIGN4PSI1MDUiIGN5PSI1MzUiIHI9IjEuNSIzPjwvZz48L3N2Zz4=');
            background-attachment: fixed;
        }

        .container {
            width: 95%;
            max-width: 1300px;
            margin: auto;
            padding: 20px;
        }

        /* تنسيق البطاقات الزجاجية الفخمة (Glassmorphism) */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            backdrop-filter: blur(8px); /* تأثير الضبابية */
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        /* تزيين زوايا البطاقات بنقوش ذهبية */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 50px; height: 50px;
            border-top: 3px solid var(--gold-primary);
            border-left: 3px solid var(--gold-primary);
            border-top-left-radius: 20px;
        }

        .card::after {
            content: '';
            position: absolute;
            bottom: 0; right: 0;
            width: 50px; height: 50px;
            border-bottom: 3px solid var(--gold-primary);
            border-right: 3px solid var(--gold-primary);
            border-bottom-right-radius: 20px;
        }

        h1, h2, h3, h4 { color: var(--gold-primary); text-shadow: 0 2px 4px rgba(0,0,0,0.5); font-weight: 700; }
        
        /* الحقول المدخلة الاحترافية */
        input, select, textarea {
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            border-radius: 10px;
            border: 1px solid #444;
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            box-sizing: border-box;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        input:focus {
            border-color: var(--gold-primary);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
            outline: none;
        }
        
        /* الأزرار الملكية */
        button {
            cursor: pointer;
            padding: 14px 28px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-gold {
            background: linear-gradient(45deg, var(--gold-primary), var(--gold-light));
            color: #1a1a1a;
            width: 100%;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2);
        }
        .btn-gold:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.4);
        }

        .btn-wa { background: #2ecc71; color: white; padding: 7px 15px; font-size: 0.9em; margin-right: 5px;}
        .btn-danger { background: #e74c3c; color: white; padding: 7px 15px; font-size: 0.9em;}

        /* الجداول الملكية */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: rgba(0,0,0,0.3); border-radius: 10px; overflow: hidden; }
        th, td { padding: 18px; text-align: right; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { color: var(--gold-light); background: rgba(26, 26, 26, 0.5); font-weight: 700; text-transform: uppercase; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: rgba(255,255,255,0.02); }

        .hidden { display: none !important; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        @media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }
        
        .qr-white { background: white; padding: 15px; display: inline-block; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        /* تنسيقات صفحة الضيف */
        .guest-container { max-width: 600px; margin: 40px auto; }
        .inv-box {
            text-align: center;
            border: 3px double var(--gold-primary);
            padding: 40px;
            background: rgba(0,0,0,0.8);
        }
        .inv-img { width: 100%; border-radius: 15px; border: 2px solid var(--gold-primary); margin-bottom: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .status-dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; margin-right: 8px;}
    </style>
</head>
<body>

<div id="app">
    <div id="login-page" class="container hidden">
        <div class="card inv-box" style="max-width: 450px; margin: 120px auto;">
            <h1 style="text-align: center;">👑 بوابة النظام الملكي</h1>
            <p style="text-align: center; color: #888;">يرجى تسجيل الدخول للوصول للوحة التحكم</p>
            <input id="user-input" type="text" placeholder="اسم المستخدم أو العميل">
            <input id="pass-input" type="password" placeholder="كلمة المرور">
            <button class="btn-gold" onclick="handleLogin()">تسجيل الدخول</button>
        </div>
    </div>

    <div id="main-page" class="container hidden">
