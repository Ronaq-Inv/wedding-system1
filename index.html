<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الزفاف الملكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --pink: #fdf2f2; --gold: #e5b3a3; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--pink); margin: 0; padding: 0; direction: rtl; }
        .container { width: 95%; max-width: 1200px; margin: auto; padding: 20px; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .hidden { display: none !important; }
        h3 { color: var(--gold); margin-top: 0; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        button { cursor: pointer; padding: 12px; border-radius: 10px; border: none; font-weight: bold; transition: 0.3s; }
        .btn-whatsapp { background: #25D366; color: white; padding: 8px 12px; font-size: 13px; text-decoration: none; border-radius: 8px; display: inline-block; }
        .btn-edit { background: #f0ad4e; color: white; padding: 8px 12px; font-size: 13px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
        .status-tag { padding: 4px 8px; border-radius: 5px; font-size: 12px; background: #eee; }
    </style>
</head>
<body>

<div id="app" class="container">
    <div id="login-page" class="card" style="max-width: 400px; margin: 50px auto; text-align: center;">
        <h3>دخول النظام 🌸</h3>
        <input id="user-input" placeholder="اسم المستخدم">
        <input id="pass-input" type="password" placeholder="كلمة المرور">
        <button id="login-trigger" style="background:var(--gold); color:white; width:100%;">دخول</button>
    </div>

    <div id="main-page" class="hidden">
        <div class="card" style="display: flex; justify-content: space-between; align-items: center;">
            <h3 style="margin:0">لوحة التحكم</h3>
            <div>
                <button onclick="window.open('scan.html', '_blank')" style="background:#3498db; color:white;">📷 الماسح</button>
                <button onclick="localStorage.clear(); location.reload();" style="background:#888; color:white;">خروج</button>
            </div>
        </div>

        <div id="admin-view" class="hidden">
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px;">
                <div class="card">
                    <h3>🎀 إضافة حفل</h3>
                    <input id="c-name" placeholder="اسم العميل (للدخول)">
                    <input id="c-event" placeholder="اسم المناسبة">
                    <input id="c-img" placeholder="رابط صورة الكرت">
                    <input id="c-map" placeholder="رابط الموقع (Maps)">
                    <button id="save-client" style="background:var(--gold); color:white; width:100%;">حفظ الحفل</button>
                </div>
                <div class="card">
                    <h3>📝 إضافة ضيف</h3>
                    <select id="client-select"></select>
                    <input id="g-name" placeholder="اسم الضيف">
                    <input id="g-phone" placeholder="رقم الجوال (05xxxx)">
                    <button id="save-guest" style="background:#8ebf9a; color:white; width:100%;">إضافة الضيف</button>
                </div>
            </div>

            <div class="card" style="overflow-x: auto;">
                <h3>قائمة الضيوف والتحكم</h3>
                <div id="admin-table-container"></div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, query, where, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBycODn3kTe7uRIBYifDogSPmv2towU6lA",
        authDomain: "wedding-system-6fadd.firebaseapp.com",
        projectId: "wedding-system-6fadd",
        storageBucket: "wedding-system-6fadd.firebasestorage.app",
        messagingSenderId: "902051092170",
        appId: "1:902051092170:web:e228d3138a5b091b974633"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // الرابط الثابت لموقعك على GitHub Pages
    const BASE_URL = "https://abdulrhman9591.github.io/wedding-system1/";

    window.handleLogin = async () => {
        const u = document.getElementById('user-input').value;
        const p = document.getElementById('pass-input').value;
        if(u === "admin" && p === "123456") {
            localStorage.setItem('role', 'admin');
            location.reload();
        }
    };
    document.getElementById('login-trigger').onclick = window.handleLogin;

    window.addClient = async () => {
        const data = {
            name: document.getElementById('c-name').value,
            event: document.getElementById('c-event').value,
            img: document.getElementById('c-img').value,
            map: document.getElementById('c-map').value
        };
        await addDoc(collection(db, "v30_data"), data);
        alert("تم حفظ الحفل");
        location.reload();
    };
    document.getElementById('save-client').onclick = window.addClient;

    window.addGuest = async () => {
        const clientName = document.getElementById('client-select').value;
        const name = document.getElementById('g-name').value;
        let phone = document.getElementById('g-phone').value;
        if(!clientName || !name || !phone) return alert("يرجى إكمال البيانات");
        
        if(phone.startsWith('0')) phone = '966' + phone.substring(1);
        else if(!phone.startsWith('966')) phone = '966' + phone;

        await addDoc(collection(db, "v30_guests"), {
            belongsTo: clientName,
            name: name,
            phone: phone,
            status: "انتظار"
        });
        alert("تمت إضافة الضيف");
        loadAdminTable(clientName);
    };
    document.getElementById('save-guest').onclick = window.addGuest;

    window.resetGuestStatus = async (id, clientName) => {
        const newStatus = prompt("أدخل الحالة الجديدة (انتظار / حضور / اعتذار):", "انتظار");
        if(newStatus) {
            await updateDoc(doc(db, "v30_guests", id), { status: newStatus });
            alert("تم تحديث الحالة");
            loadAdminTable(clientName);
        }
    };

    async function loadAdminTable(clientName) {
        const q = query(collection(db, "v30_guests"), where("belongsTo", "==", clientName));
        const snap = await getDocs(q);
        let html = `<table><tr><th>الاسم</th><th>الحالة</th><th>إرسال الدعوة</th><th>التحكم</th></tr>`;
        
        snap.forEach(d => {
            const g = d.data();
            // هنا التصحيح: نستخدم الرابط الثابت للمستودع
            const inviteUrl = `${BASE_URL}?id=${d.id}`;
            const waMsg = `السلام عليكم يا ${g.name}%0Aنتشرف بدعوتكم لحضور حفلنا عبر الرابط التالي:%0A${inviteUrl}`;
            
            html += `<tr>
                <td>${g.name}</td>
                <td><span class="status-tag">${g.status}</span></td>
                <td><a href="https://wa.me/${g.phone}?text=${waMsg}" target="_blank" class="btn-whatsapp">واتساب ✅</a></td>
                <td><button onclick="resetGuestStatus('${d.id}', '${clientName}')" class="btn-edit">⚙️ تعديل</button></td>
            </tr>`;
        });
        document.getElementById('admin-table-container').innerHTML = html + "</table>";
    }

    async function init() {
        if(localStorage.getItem('role') === 'admin') {
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('main-page').classList.remove('hidden');
            document.getElementById('admin-view').classList.remove('hidden');

            const s = await getDocs(collection(db, "v30_data"));
            const sel = document.getElementById('client-select');
            sel.innerHTML = "<option value=''>اختر حفل لرؤية الضيوف</option>";
            s.forEach(d => sel.innerHTML += `<option value="${d.data().name}">${d.data().name}</option>`);
            
            sel.onchange = () => { if(sel.value) loadAdminTable(sel.value); };
        }
    }
    init();
</script>
</body>
</html>
