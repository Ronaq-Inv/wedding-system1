<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الدعوات التفاعلي الذكي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --card: #1a1a1a; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--white); margin: 0; text-align: center; }
        .container { padding: 20px; max-width: 1200px; margin: auto; }
        .hidden { display: none !important; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid var(--gold); margin-bottom: 20px; }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; background: #000; color: #fff; border: 1px solid var(--gold); box-sizing: border-box; }
        button { cursor: pointer; padding: 12px 25px; border-radius: 8px; border: none; background: var(--gold); color: #000; font-weight: bold; width: 100%; margin-top: 10px; }
        
        /* تصميم دعوة الضيف */
        .invitation-box { max-width: 500px; margin: auto; padding: 20px; border: 2px double var(--gold); border-radius: 20px; }
        .invitation-img { width: 100%; border-radius: 10px; margin-bottom: 20px; }
        .qr-box { background: white; padding: 10px; display: inline-block; margin-top: 20px; border-radius: 10px; }
        .btn-confirm { background: #2ecc71; color: white; margin-bottom: 10px; }
        .btn-cancel { background: #e74c3c; color: white; }
    </style>
</head>
<body>

    <div id="guest-page" class="container hidden">
        <div class="invitation-box">
            <h2 id="event-title">دعوة خاصة</h2>
            <img id="invitation-image" class="invitation-img" src="" alt="كرت الدعوة">
            <h3 id="guest-welcome">مرحباً بك</h3>
            
            <div id="action-buttons">
                <p>هل ستشرفنا بحضورك؟</p>
                <button class="btn-confirm" onclick="confirmAttendance(true)">✅ نعم، سأحضر</button>
                <button class="btn-cancel" onclick="confirmAttendance(false)">❌ أعتذر</button>
            </div>

            <div id="confirmation-result" class="hidden">
                <h2 style="color: #2ecc71;">تم تأكيد حضورك بنجاح! 🎉</h2>
                <p>يُرجى إبراز الباركود عند الدخول:</p>
                <div id="qrcode" class="qr-box"></div>
                <div style="margin-top:20px;">
                    <p>📍 موقع المناسبة: <a id="map-link" href="#" style="color:var(--gold)">اضغط هنا للخريطة</a></p>
                </div>
            </div>
        </div>
    </div>

    <div id="system-page" class="container">
        <div id="login-section" class="card" style="max-width:400px; margin: 50px auto;">
            <h2>دخول النظام</h2>
            <input id="user-input" type="text" placeholder="اسم المستخدم">
            <input id="pass-input" type="password" placeholder="كلمة المرور">
            <button onclick="handleLogin()">دخول</button>
        </div>

        <div id="main-content" class="hidden">
            <div id="admin-view" class="hidden">
                <div class="card">
                    <h3>إضافة حفل جديد</h3>
                    <input id="c-name" type="text" placeholder="اسم العميل (اسم المستخدم للعميل)">
                    <input id="c-event" type="text" placeholder="اسم المناسبة">
                    <input id="c-img" type="text" placeholder="رابط كرت الدعوة">
                    <input id="c-map" type="text" placeholder="رابط موقع القاعة (Google Maps)">
                    <button onclick="addClient()">حفظ وإعداد الحفل</button>
                </div>

                <div class="card">
                    <h3>إضافة ضيف وإرسال الرابط</h3>
                    <select id="client-select"></select>
                    <input id="g-name" type="text" placeholder="اسم الضيف">
                    <input id="g-phone" type="tel" placeholder="رقم الجوال">
                    <button onclick="addGuest()">إضافة الضيف وتجهيز الرابط</button>
                </div>

                <div id="admin-table" class="card"></div>
            </div>

            <div id="client-view" class="hidden">
                <h2 id="client-welcome">إحصائيات حفلكم</h2>
                <div id="client-stats"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, query, where, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBycODn3kTe7uRIBYifDogSPmv2towU6lA",
            authDomain: "wedding-system-6fadd.firebaseapp.com",
            projectId: "wedding-system-6fadd",
            storageBucket: "wedding-system-6fadd.firebasestorage.app",
            messagingSenderId: "902051092170",
            appId: "1:902051092170:web:e228d3138a5b091b974633"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // فحص الروابط (هل الزائر ضيف؟)
        const urlParams = new URLSearchParams(window.location.search);
        const guestId = urlParams.get('id');

        if (guestId) {
            loadGuestInvitation(guestId);
        }

        async function loadGuestInvitation(id) {
            document.getElementById('system-page').classList.add('hidden');
            document.getElementById('guest-page').classList.remove('hidden');
            
            const docRef = doc(db, "v4_guests", id);
            const snap = await getDoc(docRef);
            
            if (snap.exists()) {
                const guest = snap.data();
                document.getElementById('guest-welcome').innerText = "يا " + guest.name;
                
                // جلب بيانات الحفل
                const q = query(collection(db, "v4_clients"), where("name", "==", guest.belongsTo));
                const cSnap = await getDocs(q);
                cSnap.forEach(cd => {
                    const c = cd.data();
                    document.getElementById('invitation-image').src = c.img;
                    document.getElementById('event-title').innerText = c.event;
                    document.getElementById('map-link').href = c.map;
                });
                
                if(guest.status === "حضور") showQR(id);
            }
        }

        window.confirmAttendance = async (willAttend) => {
            const status = willAttend ? "حضور" : "اعتذار";
            await updateDoc(doc(db, "v4_guests", guestId), { status });
            if(willAttend) showQR(guestId);
            else alert("تم تسجيل اعتذارك، نشكرك لاهتمامك.");
        };

        function showQR(text) {
            document.getElementById('action-buttons').classList.add('hidden');
            document.getElementById('confirmation-result').classList.remove('hidden');
            new QRCode(document.getElementById("qrcode"), { text: text, width: 150, height: 150 });
        }

        // --- لوحة التحكم ---
        window.handleLogin = async () => {
            const user = document.getElementById('user-input').value;
            const pass = document.getElementById('pass-input').value;
            if(user === "admin" && pass === "123456") {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('admin-view').classList.remove('hidden');
                loadAdmin();
            } else {
                checkClient(user);
            }
        };

        window.addClient = async () => {
            const name = document.getElementById('c-name').value;
            const event = document.getElementById('c-event').value;
            const img = document.getElementById('c-img').value;
            const map = document.getElementById('c-map').value;
            await addDoc(collection(db, "v4_clients"), { name, event, img, map });
            alert("تم إعداد الحفل");
            loadAdmin();
        };

        window.addGuest = async () => {
            const belongsTo = document.getElementById('client-select').value;
            const name = document.getElementById('g-name').value;
            let phone = document.getElementById('g-phone').value;
            if(phone.startsWith('0')) phone = '966' + phone.substring(1);
            
            const docRef = await addDoc(collection(db, "v4_guests"), { belongsTo, name, phone, status: "لم يحدد" });
            const inviteLink = window.location.href.split('?')[0] + "?id=" + docRef.id;
            
            const text = encodeURIComponent(`دعوة خاصة للغالي ${name}\nننتظر تشريفك لنا، يرجى تأكيد الحضور عبر الرابط التفاعلي:\n${inviteLink}`);
            window.open(`https://wa.me/${phone}?text=${text}`, '_blank');
            loadAdmin();
        };

        async function loadAdmin() {
            const sel = document.getElementById('client-select');
            const cSnap = await getDocs(collection(db, "v4_clients"));
            sel.innerHTML = "";
            cSnap.forEach(d => sel.innerHTML += `<option value="${d.data().name}">${d.data().name}</option>`);
            
            const gSnap = await getDocs(collection(db, "v4_guests"));
            let html = `<table border="1" style="width:100%; margin-top:20px;"><tr><th>الضيف</th><th>الحالة</th></tr>`;
            gSnap.forEach(d => {
                html += `<tr><td>${d.data().name}</td><td>${d.data().status}</td></tr>`;
            });
            document.getElementById('admin-table').innerHTML = html + "</table>";
        }
    </script>
</body>
</html>
