<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام رونق للدعوات ⚜️</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBycODn3kTe7uRIBYifDogSPmv2towU6lA", projectId: "wedding-system-6fadd", appId: "1:902051092170:web:e228d3138a5b091b974633" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // الدالة المحدثة التي تحل المشكلة
        async function init() {
            // 1. التحقق من وجود جلسة إدارية أو عميل
            if (sessionStorage.getItem('role')) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('guest-section').classList.add('hidden');
                document.getElementById('dashboard-section').classList.remove('hidden');
                // هنا تضع كود تشغيل لوحة التحكم الخاصة بك
            } 
            // 2. إذا لم توجد جلسة، تحقق هل هو رابط ضيف؟
            else {
                let guestId = new URLSearchParams(window.location.search).get('id');
                if (guestId) {
                    document.getElementById('login-section').classList.add('hidden');
                    document.getElementById('dashboard-section').classList.add('hidden');
                    document.getElementById('guest-section').classList.remove('hidden');
                    // هنا تضع كود عرض صفحة الضيف
                } else {
                    // 3. إذا لم يكن لا هذا ولا ذاك، أظهر صفحة الدخول
                    document.getElementById('dashboard-section').classList.add('hidden');
                    document.getElementById('guest-section').classList.add('hidden');
                    document.getElementById('login-section').classList.remove('hidden');
                }
            }
        }

        window.logout = () => {
            sessionStorage.clear();
            localStorage.clear();
            window.location.href = window.location.pathname; // إعادة تحميل الصفحة بدون استعلامات
        };

        window.onload = init;
    </script>
</head>
<body>

    <div id="login-section" class="hidden">
        <!-- نموذج الدخول الخاص بك -->
        <h1>تسجيل الدخول</h1>
    </div>

    <div id="guest-section" class="hidden">
        <!-- واجهة الضيف -->
        <h1>واجهة الضيف</h1>
    </div>

    <div id="dashboard-section" class="hidden">
        <!-- لوحة التحكم -->
        <h1>لوحة التحكم</h1>
        <button onclick="logout()">خروج</button>
    </div>

</body>
</html>
