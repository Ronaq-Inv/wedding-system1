<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة مناسبات الزفاف الملكي</title>
    <style>
        :root { --primary: #e94560; --bg: #1a1a2e; --card: #16213e; --accent: #0f3460; --success: #2ecc71; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: white; margin: 0; min-height: 100vh; }
        .container { width: 95%; max-width: 1400px; margin: 20px auto; }
        .hidden { display: none !important; }
        
        /* تصميم الدخول */
        .login-screen { max-width: 450px; margin: 100px auto; background: var(--card); padding: 40px; border-radius: 20px; text-align: center; border: 1px solid var(--primary); }
        
        /* الأزرار والقوائم */
        .nav-header { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 15px 30px; border-radius: 12px; margin-bottom: 25px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid var(--accent); background: #0a0a1a; color: white; box-sizing: border-box; }
        button { cursor: pointer; padding: 12px 20px; border-radius: 8px; border: none; background: var(--primary); color: white; font-weight: bold; transition: 0.2s; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        
        /* الجداول والكروت */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; border-right: 5px solid var(--primary); position: relative; }
        .guest-row { background: #0a0a1a; padding: 15px; border-radius: 10px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid #555; }
        .status-btn { padding: 5px 10px; font-size: 0.8em; border-radius: 5px; margin-right: 5px; }
        .wa-btn { background: #25d366; } /* لون واتساب */
        .del-btn { background: #ff4d4d; }
    </style>
</head>
<body>

    <div id="login-page" class="login-screen">
        <h2 style="color: var(--primary)">👑 دخول النظام</h2>
        <input id="user-input" type="text" placeholder="اسم المستخدم">
        <input id="pass-input" type="password" placeholder="كلمة المرور (للأدمن)">
        <button style="width: 100%" onclick="handleLogin()">تسجيل الدخول</button>
    </div>

    <div id="main-content" class="container hidden">
        <div class="nav-header">
            <h2 id="user-title">لوحة التحكم</h2>
            <button onclick="location.reload()" style="background: #444;">تسجيل خروج</button>
        </div>

        <div id="admin-section" class="hidden">
            <div class="card" style="margin-bottom: 30px;">
                <h3>✨ إضافة عميل جديد (صاحب مناسبة)</h3>
                <div class="grid">
                    <input id="new-client-name" type="text" placeholder="اسم العميل">
                    <input id="new-client-event" type="text" placeholder="نوع المناسبة (مثلاً: زفاف آل فلان)">
                    <textarea id="new-client-msg" placeholder="نص رسالة الواتساب الترحيبية للضيوف"></textarea>
                    <input id="new-client-file" type="text" placeholder="رابط الملف المرفق (صورة الدعوة)">
                </div>
                <button onclick="createNewClient()">تأسيس حساب العميل</button>
            </div>
            <h3>👥 قائمة العملاء الحاليين</h3>
            <div id="clients-list" class="grid"></div>
        </div>

        <div id="client-section" class="hidden">
            <div class="card">
                <h3>➕ إضافة ضيف لقائمتك</h3>
                <div style="display: flex; gap: 10px;">
                    <input id="guest-name" type="text" placeholder="اسم الضيف">
                    <input id="guest-phone" type="tel" placeholder="رقم واتساب الضيف (966...)">
                    <button onclick="addGuest()">إضافة ضيف</button>
                </div>
            </div>
            <br>
            <div id="guests-list">
                <h3>📋 قائمة ضيوفك</h3>
                <div id="guests-container"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBycODn3kTe7uRIBYifDogSPmv2towU6lA",
            authDomain: "wedding-system-6fadd.firebaseapp.com",
            projectId: "wedding-system-6fadd",
            storageBucket: "wedding-system-6fadd.firebasestorage.app",
            messagingSenderId: "902051092170",
            appId: "1:902051092170:web:e228d3138a5b091b974633"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentSessionUser = "";
        let currentClientData = null;

        window.handleLogin = async () => {
            const user = document.getElementById("user-input").value;
            const pass = document.getElementById("pass-input").value;

            if (user === "admin" && pass === "123456") {
                startAdmin();
            } else {
                checkClientLogin(user);
            }
        };

        // وظائف الأدمن
        function startAdmin() {
            document.getElementById("login-page").classList.add("hidden");
            document.getElementById("main-content").classList.remove("hidden");
            document.getElementById("admin-section").classList.remove("hidden");
            document.getElementById("user-title").innerText = "لوحة تحكم المدير العام";
            loadClients();
        }

        window.createNewClient = async () => {
            const name = document.getElementById("new-client-name").value;
            const event = document.getElementById("new-client-event").value;
            const msg = document.getElementById("new-client-msg").value;
            const file = document.getElementById("new-client-file").value;

            if(!name) return alert("اكتب اسم العميل");
            await addDoc(collection(db, "users_list"), { name, event, msg, file });
            alert("تم إنشاء حساب العميل بنجاح");
            loadClients();
        };

        async function loadClients() {
            const list = document.getElementById("clients-list");
            const snap = await getDocs(collection(db, "users_list"));
            list.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                list.innerHTML += `<div class="card">
                    <strong>👤 ${data.name}</strong><br>
                    <small>📌 ${data.event}</small><br>
                    <button class="del-btn" onclick="deleteClient('${d.id}')">حذف العميل</button>
                </div>`;
            });
        }

        // وظائف العميل
        async function checkClientLogin(userName) {
            const q = query(collection(db, "users_list"), where("name", "==", userName));
            const snap = await getDocs(q);
            if(snap.empty) return alert("عذراً، اسم المستخدم غير مسجل");
            
            snap.forEach(d => {
                currentClientData = { id: d.id, ...d.data() };
                currentSessionUser = d.data().name;
            });

            document.getElementById("login-page").classList.add("hidden");
            document.getElementById("main-content").classList.remove("hidden");
            document.getElementById("client-section").classList.remove("hidden");
            document.getElementById("user-title").innerText = "لوحة " + currentClientData.event;
            loadGuests();
        }

        window.addGuest = async () => {
            const gName = document.getElementById("guest-name").value;
            const gPhone = document.getElementById("guest-phone").value;
            if(!gName || !gPhone) return alert("اكمل بيانات الضيف");
            
            await addDoc(collection(db, "guests_list"), {
                belongsTo: currentSessionUser,
                name: gName,
                phone: gPhone,
                status: "لم يحدد"
            });
            loadGuests();
        };

        async function loadGuests() {
            const container = document.getElementById("guests-container");
            const q = query(collection(db, "guests_list"), where("belongsTo", "==", currentSessionUser));
            const snap = await getDocs(q);
            container.innerHTML = "";
            snap.forEach(d => {
                const g = d.data();
                container.innerHTML += `
                <div class="guest-row">
                    <div>
                        <strong>${g.name}</strong> (${g.phone}) <br>
                        <span style="color: ${g.status === 'حضور' ? '#2ecc71' : (g.status === 'اعتذار' ? '#ff4d4d' : '#aaa')}">الحالة: ${g.status}</span>
                    </div>
                    <div>
                        <button class="status-btn" style="background:#2ecc71" onclick="updateStatus('${d.id}', 'حضور')">حضور</button>
                        <button class="status-btn" style="background:#ff4d4d" onclick="updateStatus('${d.id}', 'اعتذار')">اعتذار</button>
                        <button class="wa-btn" onclick="sendWA('${g.phone}', '${g.name}')">واتساب 📱</button>
                        <button class="del-btn" style="padding:5px" onclick="deleteGuest('${d.id}')">X</button>
                    </div>
                </div>`;
            });
        }

        window.updateStatus = async (id, stat) => {
            await updateDoc(doc(db, "guests_list", id), { status: stat });
            loadGuests();
        };

        window.sendWA = (phone, guestName) => {
            const baseMsg = currentClientData.msg || "مرحباً بك";
            const fileLink = currentClientData.file ? "\nرابط الدعوة: " + currentClientData.file : "";
            const finalMsg = `يا ${guestName}\n${baseMsg}${fileLink}`;
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(finalMsg)}`, '_blank');
        };

        window.deleteGuest = async (id) => { if(confirm("حذف الضيف؟")) { await deleteDoc(doc(db, "guests_list", id)); loadGuests(); } };
        window.deleteClient = async (id) => { if(confirm("حذف العميل بكل بياناته؟")) { await deleteDoc(doc(db, "users_list", id)); loadClients(); } };
    </script>
</body>
</html>
