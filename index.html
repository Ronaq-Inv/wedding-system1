<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة ملكية تفاعلية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --gold: #c5a059; --dark: #1a1a1a; --white: #ffffff; }
        body, html { margin: 0; padding: 0; font-family: 'Cairo', sans-serif; background-color: #000; color: var(--white); height: 100%; overflow-x: hidden; }
        
        /* تصميم واجهة الضيف - شاشة كاملة */
        .guest-container { 
            max-width: 500px; margin: auto; min-height: 100vh; position: relative;
            background-size: cover; background-position: center; display: flex; flex-direction: column;
        }
        .overlay { 
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.8)); 
            flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; padding: 40px 20px; text-align: center;
        }

        .invitation-card { border: 2px solid var(--gold); border-radius: 15px; padding: 20px; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); }
        .invitation-title { font-family: 'Amiri', serif; color: var(--gold); font-size: 2.2rem; margin-bottom: 10px; }
        .guest-name { font-size: 1.4rem; margin: 20px 0; border-bottom: 1px solid var(--gold); display: inline-block; padding-bottom: 5px; }

        /* الأزرار التفاعلية */
        .action-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .btn-action { 
            padding: 15px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; 
            font-size: 1.1rem; transition: 0.3s; font-family: 'Cairo';
        }
        .btn-accept { background-color: #27ae60; color: white; box-shadow: 0 4px 15px rgba(39, 174, 96, 0.4); }
        .btn-decline { background-color: #c0392b; color: white; box-shadow: 0 4px 15px rgba(192, 57, 43, 0.4); }
        
        /* قسم الباركود */
        #qr-result { margin-top: 20px; padding: 20px; background: white; border-radius: 15px; display: inline-block; }
        .map-link { color: var(--gold); text-decoration: none; font-weight: bold; display: block; margin-top: 15px; }

        /* لوحة التحكم (مخفية للضيف) */
        .admin-panel { background: #fdf2f2; color: #333; padding: 20px; min-height: 100vh; }
        .hidden { display: none !important; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; }
        .btn-gold { background: var(--gold); color: white; width: 100%; border: none; padding: 15px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div id="app">
    <div id="login-section" class="admin-panel hidden" style="text-align:center;">
        <h2 style="color:var(--gold)">دخول النظام الملكي</h2>
        <div style="max-width:350px; margin:auto; background:white; padding:30px; border-radius:20px;">
            <input id="user-input" placeholder="اسم المستخدم">
            <input id="pass-input" type="password" placeholder="كلمة المرور">
            <button class="btn-gold" id="login-btn">دخول</button>
        </div>
    </div>

    <div id="guest-section" class="hidden">
        <div class="guest-container" id="bg-image">
            <div class="overlay">
                <div>
                    <div class="invitation-title" id="inv-event">حفل زفاف</div>
                    <p style="letter-spacing: 2px;">يتمم على خير بإذن الله</p>
                </div>

                <div class="invitation-card">
                    <p>المكرم / المكرمة</p>
                    <div class="guest-name" id="inv-guest"></div>
                    <p>نتشرف بدعوتكم لمشاركتنا فرحتنا</p>
                </div>

                <div id="guest-actions">
                    <div class="action-buttons">
                        <button id="btn-yes" class="btn-action btn-accept">قبول</button>
                        <button id="btn-no" class="btn-action btn-decline">اعتذار</button>
                    </div>
                </div>

                <div id="qr-result" class="hidden">
                    <div id="qrcode"></div>
                    <p style="color:#333; margin-top:10px;">باركود الدخول الذكي</p>
                    <a id="inv-map" class="map-link" target="_blank">📍 موقع القاعة على الخريطة</a>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboard-section" class="admin-panel hidden">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3>لوحة التحكم</h3>
            <button onclick="sessionStorage.clear(); location.reload();">خروج</button>
        </div>
        <div id="admin-controls" class="hidden">
            <div class="invitation-card" style="background:white; color:#333; margin-bottom:20px;">
                <h4>تأسيس حفل</h4>
                <input id="c-name" placeholder="اسم العميل">
                <input id="c-pass" placeholder="كلمة السر">
                <input id="c-event" placeholder="المناسبة">
                <input id="c-img" placeholder="رابط الخلفية (الصورة)">
                <input id="c-map" placeholder="رابط الخريطة">
                <button class="btn-gold" id="save-client">تأسيس</button>
            </div>
        </div>
        <div id="data-table"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, where, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBycODn3kTe7uRIBYifDogSPmv2towU6lA",
        authDomain: "wedding-system-6fadd.firebaseapp.com",
        projectId: "wedding-system-6fadd",
        storageBucket: "wedding-system-6fadd.firebasestorage.app",
        messagingSenderId: "902051092170",
        appId: "1:902051092170:web:e228d3138a5b091b974633"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        const guestId = urlParams.get('id');

        if(guestId) {
            // عرض واجهة الضيف الأنيقة
            document.getElementById('guest-section').classList.remove('hidden');
            const gDoc = await getDoc(doc(db, "v30_guests", guestId));
            if(gDoc.exists()) {
                const g = gDoc.data();
                document.getElementById('inv-guest').innerText = g.name;
                const cSnap = await getDocs(query(collection(db, "v30_data"), where("name", "==", g.belongsTo)));
                cSnap.forEach(cd => {
                    document.getElementById('inv-event').innerText = cd.data().event;
                    document.getElementById('bg-image').style.backgroundImage = `url('${cd.data().img}')`;
                    document.getElementById('inv-map').href = cd.data().map;
                });

                if(g.status !== "انتظار") {
                    document.getElementById('guest-actions').classList.add('hidden');
                    if(g.status !== "اعتذار") {
                        document.getElementById('qr-result').classList.remove('hidden');
                        new QRCode(document.getElementById("qrcode"), { text: guestId, width: 150, height: 150 });
                    }
                } else {
                    document.getElementById('btn-yes').onclick = async () => { await updateDoc(doc(db, "v30_guests", guestId), { status: "حضور" }); location.reload(); };
                    document.getElementById('btn-no').onclick = async () => { await updateDoc(doc(db, "v30_guests", guestId), { status: "اعتذار" }); location.reload(); };
                }
            }
        } else {
            // عرض صفحة الدخول للأدمن
            document.getElementById('login-section').classList.remove('hidden');
            // ... (بقية منطق الدخول والأدمن كما في الكود السابق)
        }
    }
    init();
</script>
</body>
</html>
