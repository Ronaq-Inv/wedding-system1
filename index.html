<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فخامة للدعوات الإلكترونية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #fdf2f2; --gold: #c5a059; --dark: #333; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--pink); margin: 0; padding: 0; direction: rtl; color: var(--dark); }
        .container { width: 90%; max-width: 500px; margin: auto; padding: 20px; }
        .card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center; border: 1px solid #eee; }
        .hidden { display: none !important; }
        
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; font-family: 'Cairo'; box-sizing: border-box; }
        button { cursor: pointer; padding: 15px; border-radius: 10px; border: none; font-weight: bold; width: 100%; transition: 0.3s; font-family: 'Cairo'; }
        
        .btn-gold { background: var(--gold); color: white; font-size: 1.1rem; }
        .price-tag { color: var(--gold); font-weight: bold; font-size: 1.2rem; display: block; margin: 10px 0; }
        .option-box { border: 2px solid #eee; border-radius: 15px; padding: 15px; margin-bottom: 10px; cursor: pointer; transition: 0.3s; }
        .option-box.selected { border-color: var(--gold); background-color: #fff9f0; }
        
        .admin-nav { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: white; margin-bottom: 20px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="order-section">
        <div class="card">
            <h2 style="color:var(--gold); margin-top:0;">طلب تصميم دعوة 🌸</h2>
            <p>أدخل بياناتك وسنتواصل معك فوراً</p>
            
            <input id="order-name" placeholder="الاسم الكريم">
            <input id="order-guests" type="number" placeholder="عدد الضيوف المتوقع">
            
            <div style="text-align: right; margin-top: 15px;">
                <p style="font-weight: bold;">اختر الباقة المناسبة:</p>
                <div class="option-box" onclick="selectPkg(this, 'بطاقة دعوة فقط', '50')">
                    <strong>🧧 بطاقة دعوة فقط</strong>
                    <span class="price-tag" id="p1">50 ريال</span>
                </div>
                <div class="option-box" onclick="selectPkg(this, 'واتساب + بطاقة + باركود', '150')">
                    <strong>📲 واتساب + بطاقة + باركود</strong>
                    <span class="price-tag" id="p2">150 ريال</span>
                </div>
            </div>

            <button class="btn-gold" id="send-order">إرسال الطلب عبر واتساب 🚀</button>
            <p style="font-size: 12px; color: #888; margin-top: 15px;" onclick="showLogin()">دخول الإدارة</p>
        </div>
    </div>

    <div id="login-section" class="hidden">
        <div class="card">
            <h3>تسجيل دخول الإدارة</h3>
            <input id="user-input" placeholder="اسم المستخدم">
            <input id="pass-input" type="password" placeholder="كلمة المرور">
            <button class="btn-gold" id="login-btn">دخول</button>
            <button onclick="location.reload()" style="background:none; color:#888;">رجوع</button>
        </div>
    </div>

    <div id="admin-section" class="hidden">
        <div class="admin-nav">
            <strong>لوحة التحكم</strong>
            <button onclick="logout()" style="width:auto; padding:5px 10px; background:#888; color:white;">خروج</button>
        </div>

        <div class="card">
            <h4>تعديل الأسعار ورقم التواصل</h4>
            <input id="set-price1" placeholder="سعر الباقة الأولى">
            <input id="set-price2" placeholder="سعر الباقة الثانية">
            <input id="set-admin-phone" placeholder="رقم واتسابك (966...)">
            <button class="btn-gold" id="save-settings">حفظ التغييرات</button>
        </div>
        
        <div class="card">
            <p>يمكنك أيضاً إدارة الحفلات والضيوف من هنا كما في السابق.</p>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBycODn3kTe7uRIBYifDogSPmv2towU6lA",
        projectId: "wedding-system-6fadd",
        appId: "1:902051092170:web:e228d3138a5b091b974633"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let selectedPackage = "";
    let selectedPrice = "";
    let adminPhone = "966508222356"; // افتراضي

    // اختيار الباقة
    window.selectPkg = (el, name, price) => {
        document.querySelectorAll('.option-box').forEach(b => b.classList.remove('selected'));
        el.classList.add('selected');
        selectedPackage = name;
        selectedPrice = price;
    };

    // إرسال الطلب لواتسابك
    document.getElementById('send-order').onclick = () => {
        const name = document.getElementById('order-name').value;
        const guests = document.getElementById('order-guests').value;
        if(!name || !selectedPackage) return alert("يرجى إكمال البيانات واختيار الباقة");

        const msg = `طلب جديد من الموقع 🌸%0Aالاسم: ${name}%0Aعدد الضيوف: ${guests}%0Aالباقة: ${selectedPackage}%0Aالسعر: ${selectedPrice} ريال`;
        window.open(`https://wa.me/${adminPhone}?text=${msg}`, '_blank');
    };

    // إدارة الدخول والأسعار
    window.showLogin = () => {
        document.getElementById('order-section').classList.add('hidden');
        document.getElementById('login-section').classList.remove('hidden');
    };

    document.getElementById('login-btn').onclick = () => {
        if(document.getElementById('user-input').value === "admin" && document.getElementById('pass-input').value === "123456") {
            sessionStorage.setItem('admin', 'true');
            location.reload();
        }
    };

    window.logout = () => { sessionStorage.clear(); location.reload(); };

    // حفظ وتحميل الإعدادات من Firebase
    document.getElementById('save-settings').onclick = async () => {
        const p1 = document.getElementById('set-price1').value;
        const p2 = document.getElementById('set-price2').value;
        const ph = document.getElementById('set-admin-phone').value;
        await setDoc(doc(db, "settings", "main"), { price1: p1, price2: p2, phone: ph });
        alert("تم التحديث");
        location.reload();
    };

    async function loadSettings() {
        const s = await getDoc(doc(db, "settings", "main"));
        if(s.exists()) {
            const d = s.data();
            document.getElementById('p1').innerText = d.price1 + " ريال";
            document.getElementById('p2').innerText = d.price2 + " ريال";
            adminPhone = d.phone;
            // للتعديل في لوحة الأدمن
            if(document.getElementById('set-price1')) {
                document.getElementById('set-price1').value = d.price1;
                document.getElementById('set-price2').value = d.price2;
                document.getElementById('set-admin-phone').value = d.phone;
            }
        }
        if(sessionStorage.getItem('admin')) {
            document.getElementById('order-section').classList.add('hidden');
            document.getElementById('admin-section').classList.remove('hidden');
        }
    }
    loadSettings();
</script>
</body>
</html>
