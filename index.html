<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة زفاف 💍</title>

    <!-- OG Tags (مهم للواتساب) -->
    <meta property="og:title" content="دعوة زفاف 💍">
    <meta property="og:description" content="اضغط لمشاهدة الدعوة وتأكيد الحضور بكل سهولة">
    <meta property="og:image" content="https://via.placeholder.com/500x300/fdf2f2/e5b3a3?text=Wedding+Invitation">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="ar_AR">
    <meta name="twitter:card" content="summary_large_image">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Amiri&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root { --soft-pink: #fdf2f2; --rose-gold: #e5b3a3; --deep-gray: #5a5a5a; --pure-white: #ffffff; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--soft-pink); color: var(--deep-gray); margin: 0; padding: 0; }
        .container { width: 95%; max-width: 1200px; margin: auto; padding: 20px; }
        .hidden { display: none !important; }
        .card { background: var(--pure-white); border-radius: 20px; padding: 25px; margin-bottom: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.03); border: 1px solid rgba(229, 179, 163, 0.2); }
        h1, h2, h3 { color: var(--rose-gold); font-family: 'Amiri', serif; margin-top: 0; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #eee; background: #fafafa; box-sizing: border-box; font-family: 'Cairo'; }
        button { cursor: pointer; padding: 12px; border-radius: 10px; border: none; font-weight: bold; transition: 0.3s; }
        .btn-main { background: var(--rose-gold); color: white; width: 100%; }
        .btn-wa { background: #58cc71; color: white; padding: 5px 10px; font-size: 13px; }
        .btn-edit { background: #3498db; color: white; padding: 5px 10px; font-size: 13px; }
        .btn-danger { background: #f8d7da; color: #721c24; padding: 5px 10px; font-size: 13px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #f5f5f5; font-size: 14px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
        .inv-img { width: 100%; border-radius: 15px; border: 4px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body>

<div id="app" class="container">
    
    <div id="login-page" class="card" style="max-width: 400px; margin: 80px auto; text-align: center;">
        <h1>🌸 دخول النظام</h1>
        <input id="user-input" placeholder="اسم المستخدم">
        <input id="pass-input" type="password" placeholder="كلمة المرور">
        <button class="btn-main" onclick="handleLogin()">دخول</button>
    </div>

    <div id="main-page" class="hidden">
        <div class="card" style="display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin:0">لوحة التحكم</h2>
            <button class="btn-danger" style="width: auto;" onclick="logout()">خروج</button>
        </div>

        <div id="admin-view" class="hidden">
            <div class="grid">
                <div class="card">
                    <h3>🎀 حفل جديد</h3>
                    <input id="c-name" placeholder="اسم العميل">
                    <input id="c-event" placeholder="عنوان الحفل">
                    <input id="c-img-file" type="file" accept="image/*">
                    <input id="c-map" placeholder="رابط الخريطة">
                    <button id="save-btn" class="btn-main" onclick="addClient()">تأسيس الحفل</button>
                </div>
                <div class="card">
                    <h3>📝 إضافة وتخصيص</h3>
                    <select id="client-select" onchange="loadAdminTable()"></select>
                    <input id="g-name" placeholder="اسم الضيف">
                    <input id="g-phone" placeholder="رقم الجوال (05...)">
                    <button class="btn-main" style="background:#8ebf9a" onclick="addGuest()">إضافة الضيف</button>
                    <textarea id="wa-template" rows="3">دعوة خاصة لـ [اسم_الضيف] ✨ نرجو تأكيد حضورك عبر الرابط: [الرابط]</textarea>
                </div>
            </div>
            <div class="card">
                <h3>📋 قائمة المدعوين</h3>
                <div id="admin-table"></div>
            </div>
        </div>

        <div id="guest-page" class="hidden" style="max-width: 500px; margin: auto; text-align: center;">
            <div class="card">
                <h1 id="inv-event"></h1>
                <img id="inv-img" class="inv-img">
                <h2 id="inv-guest"></h2>
                <div id="guest-actions">
                    <button class="btn-main" style="background:#8ebf9a;" onclick="updateGuest(true)">سأحضر ✅</button>
                    <button class="btn-main" style="background:#f4f4f4; color:#888;" onclick="updateGuest(false)">أعتذر ❌</button>
                </div>
                <div id="guest-final-yes" class="hidden">
                    <h2 style="color:#8ebf9a">نسعد بحضورك ✨</h2>
                    <div id="qrcode"></div>
                </div>
            </div>
        </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, query, where, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = { /* نفس إعداداتك */ };
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 تحديث الميتا حسب الضيف
function updateMetaForGuest(name){
    document.title = "دعوة خاصة لـ " + name + " 💍";
    document.querySelector('meta[property="og:title"]').setAttribute("content", document.title);
}

window.onload = () => {
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('id')) loadGuest(urlParams.get('id'));
};

async function loadGuest(id){
    const gSnap = await getDoc(doc(db, "v9_guests", id));
    const g = gSnap.data();

    document.getElementById('guest-page').classList.remove('hidden');
    document.getElementById('inv-guest').innerText = "يا " + g.name;

    updateMetaForGuest(g.name); // 🔥 هنا السحر
}
</script>

</body>
</html>
