<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة المناسبات - الإدارة المركزية</title>
    <style>
        :root { --primary: #e94560; --bg: #0a0a12; --card: #16213e; --accent: #4e4eef; --success: #2ecc71; --danger: #ff4d4d; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; }
        .container { width: 95%; max-width: 1400px; margin: 20px auto; }
        .hidden { display: none !important; }
        
        /* الهيدر */
        .header { background: var(--card); padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--primary); }
        
        /* التنسيق العام */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #050510; color: white; box-sizing: border-box; }
        button { cursor: pointer; padding: 12px 25px; border-radius: 8px; border: none; background: var(--primary); color: white; font-weight: bold; transition: 0.3s; }
        button:hover { opacity: 0.8; }

        /* إحصائيات العميل */
        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat-item { padding: 20px; border-radius: 12px; text-align: center; font-size: 1.2em; font-weight: bold; }
        
        /* جدول الضيوف */
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 10px; overflow: hidden; margin-top: 20px; }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid #222; }
        th { background: #1a1a3c; color: var(--primary); }
        .wa-link { color: var(--success); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-page" style="max-width: 400px; margin: 100px auto; text-align: center;" class="card">
        <h2 style="color: var(--primary)">تسجيل الدخول</h2>
        <input id="user-input" type="text" placeholder="اسم المستخدم">
        <input id="pass-input" type="password" placeholder="كلمة المرور (للأدمن)">
        <button style="width: 100%" onclick="handleLogin()">دخول</button>
    </div>

    <div id="main-content" class="container hidden">
        <div class="header card" style="margin-bottom: 20px; padding: 15px;">
            <h2 id="view-title">النظام المركزي</h2>
            <button onclick="location.reload()" style="background: #444;">خروج</button>
        </div>

        <div id="admin-view" class="hidden">
            <div class="grid">
                <div class="card">
                    <h3>1. إضافة عميل (صاحب الحفل)</h3>
                    <input id="new-client-name" type="text" placeholder="اسم العميل">
                    <input id="new-client-event" type="text" placeholder="اسم المناسبة">
                    <textarea id="new-client-msg" placeholder="نص رسالة الواتساب"></textarea>
                    <input id="new-client-file" type="text" placeholder="رابط صورة الدعوة">
                    <button onclick="addClient()">تأسيس حساب العميل</button>
                </div>

                <div class="card">
                    <h3>2. إضافة ضيف لعميل</h3>
                    <select id="select-client-for-guest"><option>اختر العميل أولاً...</option></select>
                    <input id="guest-name" type="text" placeholder="اسم الضيف">
                    <input id="guest-phone" type="tel" placeholder="رقم الجوال">
                    <button style="background: var(--success)" onclick="addGuest()">إضافة الضيف للحفل</button>
                </div>
            </div>

            <h3 style="margin-top: 40px;">إدارة الضيوف والرسائل (الأدمن)</h3>
            <div id="admin-master-list"></div>
        </div>

        <div id="client-view" class="hidden">
            <div class="stats-bar">
                <div class="stat-item" style="background: var(--success)">حضور: <span id="count-yes">0</span></div>
                <div class="stat-item" style="background: var(--danger)">اعتذار: <span id="count-no">0</span></div>
                <div class="stat-item" style="background: #555">لم يحدد: <span id="count-wait">0</span></div>
            </div>
            
            <div class="card">
                <h3>قائمة المدعوين الخاصة بك</h3>
                <table id="client-table">
                    <thead>
                        <tr><th>الاسم</th><th>الحالة</th><th>الجوال</th></tr>
                    </thead>
                    <tbody id="client-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBycODn3kTe7uRIBYifDogSPmv2towU6lA",
            authDomain: "wedding-system-6fadd.firebaseapp.com",
            projectId: "wedding-system-6fadd",
            storageBucket: "wedding-system-6fadd.firebasestorage.app",
            messagingSenderId: "902051092170",
            appId: "1:902051092170:web:e228d3138a5b091b974633"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.handleLogin = async () => {
            const user = document.getElementById("user-input").value;
            const pass = document.getElementById("pass-input").value;

            if(user === "admin" && pass === "123456") {
                document.getElementById("login-page").className = "hidden";
                document.getElementById("main-content").className = "container";
                document.getElementById("admin-view").className = "";
                loadClientsList();
            } else {
                checkClient(user);
            }
        };

        // وظائف الأدمن
        window.addClient = async () => {
            const name = document.getElementById("new-client-name").value;
            const event = document.getElementById("new-client-event").value;
            const msg = document.getElementById("new-client-msg").value;
            const file = document.getElementById("new-client-file").value;
            await addDoc(collection(db, "v2_clients"), { name, event, msg, file });
            alert("تم التأسيس");
            loadClientsList();
        };

        async function loadClientsList() {
            const sel = document.getElementById("select-client-for-guest");
            const snap = await getDocs(collection(db, "v2_clients"));
            sel.innerHTML = "<option>اختر العميل...</option>";
            snap.forEach(d => sel.innerHTML += `<option value="${d.data().name}">${d.data().name}</option>`);
            loadAdminMasterTable();
        }

        window.addGuest = async () => {
            const belongsTo = document.getElementById("select-client-for-guest").value;
            const name = document.getElementById("guest-name").value;
            const phone = document.getElementById("guest-phone").value;
            await addDoc(collection(db, "v2_guests"), { belongsTo, name, phone, status: "لم يحدد" });
            alert("تمت إضافة الضيف");
            loadAdminMasterTable();
        };

        async function loadAdminMasterTable() {
            const div = document.getElementById("admin-master-list");
            const snap = await getDocs(collection(db, "v2_guests"));
            div.innerHTML = `<table><thead><tr><th>الضيف</th><th>يتبع للعميل</th><th>الحالة</th><th>إجراء</th></tr></thead><tbody id="master-body"></tbody></table>`;
            const body = document.getElementById("master-body");
            snap.forEach(d => {
                const g = d.data();
                body.innerHTML += `<tr>
                    <td>${g.name}</td>
                    <td>${g.belongsTo}</td>
                    <td>
                        <select onchange="updateGuestStatus('${d.id}', this.value)">
                            <option ${g.status==='لم يحدد'?'selected':''}>لم يحدد</option>
                            <option ${g.status==='حضور'?'selected':''}>حضور</option>
                            <option ${g.status==='اعتذار'?'selected':''}>اعتذار</option>
                        </select>
                    </td>
                    <td><button class="stat-item" style="background:var(--danger); padding:5px 10px;" onclick="deleteGuest('${d.id}')">حذف</button></td>
                </tr>`;
            });
        }

        window.updateGuestStatus = async (id, val) => { await updateDoc(doc(db, "v2_guests", id), { status: val }); loadAdminMasterTable(); };
        window.deleteGuest = async (id) => { if(confirm("حذف؟")) { await deleteDoc(doc(db, "v2_guests", id)); loadAdminMasterTable(); } };

        // وظائف العميل (مشاهدة فقط)
        async function checkClient(name) {
            const q = query(collection(db, "v2_clients"), where("name", "==", name));
            const snap = await getDocs(q);
            if(snap.empty) return alert("الاسم غير مسجل");
            
            document.getElementById("login-page").className = "hidden";
            document.getElementById("main-content").className = "container";
            document.getElementById("client-view").className = "";
            document.getElementById("view-title").innerText = "لوحة متابعة: " + name;
            loadClientData(name);
        }

        async function loadClientData(clientName) {
            const q = query(collection(db, "v2_guests"), where("belongsTo", "==", clientName));
            const snap = await getDocs(q);
            const body = document.getElementById("client-table-body");
            body.innerHTML = "";
            let counts = { yes: 0, no: 0, wait: 0 };

            snap.forEach(d => {
                const g = d.data();
                if(g.status === "حضور") counts.yes++;
                else if(g.status === "اعتذار") counts.no++;
                else counts.wait++;

                body.innerHTML += `<tr>
                    <td>${g.name}</td>
                    <td style="color:${g.status==='حضور'?'#2ecc71':(g.status==='اعتذار'?'#ff4d4d':'#aaa')}">${g.status}</td>
                    <td>${g.phone}</td>
                </tr>`;
            });

            document.getElementById("count-yes").innerText = counts.yes;
            document.getElementById("count-no").innerText = counts.no;
            document.getElementById("count-wait").innerText = counts.wait;
        }
    </script>
</body>
</html>
