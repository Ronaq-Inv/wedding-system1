<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام رونق للدعوات ⚜️</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --pink: #fdf2f2; --gold: #c5a059; --dark-gold: #b38b7d; --black: #1a1a1a; }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--pink); 
            background-image: url('https://www.transparenttextures.com/patterns/islamic-art.png');
            margin: 0; padding: 0; direction: rtl; 
        }

        .container { width: 95%; max-width: 900px; margin: auto; padding: 20px; }
        
        /* تنسيق اللوجو في الإحصائيات */
        .brand-header { text-align: center; margin-bottom: 20px; }
        .main-logo {
            width: 120px; height: 120px; border-radius: 50%;
            border: 3px solid var(--gold); background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); padding: 5px;
        }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-card { 
            background: linear-gradient(145deg, var(--black), #333); 
            color: var(--gold); padding: 20px; border-radius: 15px; 
            text-align: center; border: 1px solid var(--gold);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .stat-card h4 { margin: 0; font-size: 14px; opacity: 0.8; }
        .stat-card p { margin: 5px 0 0; font-size: 24px; font-weight: bold; }

        /* أزرار الإدارة الجديدة */
        .admin-quick-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .btn-nav { background: #2c3e50; color: white; padding: 10px; border-radius: 10px; font-size: 12px; text-decoration: none; display: flex; align-items: center; justify-content: center; border: 1px solid var(--gold); }
        .btn-nav:hover { background: var(--black); }

        .card { 
            background: white; border-radius: 20px; padding: 25px; margin-bottom: 20px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center;
            border-top: 5px solid var(--gold); position: relative;
        }

        .hidden { display: none !important; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; font-family: 'Cairo'; box-sizing: border-box; }
        button { cursor: pointer; padding: 12px; border-radius: 10px; border: none; font-weight: bold; transition: 0.3s; font-family: 'Cairo'; width: 100%; }
        
        .btn-gold { background: var(--gold); color: white; box-shadow: 0 4px 10px rgba(197, 160, 89, 0.3); }
        .btn-gold:hover { background: var(--dark-gold); }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; border-radius: 15px; overflow: hidden; }
        th { background: var(--black); color: var(--gold); padding: 15px; font-size: 14px; }
        td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; font-size: 13px; color: #444; }
        
        .status-pill { padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .status-حضور { background: #e8f5e9; color: #2e7d32; }
        .status-اعتذار { background: #ffebee; color: #c62828; }
        .status-انتظار { background: #fff8e1; color: #f9a825; }

        .btn-wa { background: #25D366; color: white; padding: 8px 12px; border-radius: 8px; font-size: 11px; border: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section">
        <div class="card" style="max-width: 400px; margin: auto;">
            <div class="brand-header"><img src="لوقو .jpeg" class="main-logo"></div>
            <h2 style="color:var(--gold)">نظام رونق للدعوات ⚜️</h2>
            <input id="user-input" placeholder="اسم المستخدم">
            <input id="pass-input" type="password" placeholder="كلمة المرور">
            <button class="btn-gold" id="login-btn">دخول للنظام</button>
        </div>
    </div>

    <div id="dashboard-section" class="hidden">
        <div class="brand-header">
            <img src="لوقو .jpeg" class="main-logo">
            <h3 id="welcome-msg" style="color: var(--black); margin-top: 10px;"></h3>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><h4>إجمالي المدعوين</h4><p id="stat-total">0</p></div>
            <div class="stat-card"><h4>تأكيد حضور</h4><p id="stat-yes">0</p></div>
            <div class="stat-card"><h4>اعتذارات</h4><p id="stat-no">0</p></div>
        </div>

        <div id="admin-area" class="hidden">
            <div class="card">
                <h3>⚙️ إعدادات الإدارة السريعة</h3>
                <div class="admin-quick-actions">
                    <button class="btn-nav" onclick="window.open('scan.html', '_blank')">🔍 ماسح الباركود</button>
                    <button class="btn-nav" onclick="window.open('orders.html', '_blank')">📥 طلبات العملاء</button>
                    <button class="btn-nav" id="view-client-page">📄 صفحة العميل</button>
                </div>
                <input id="set-admin-phone" placeholder="رقم واتساب الإدارة (966...)">
                <button class="btn-gold" id="save-settings" style="margin-top:10px">حفظ رقم الواتساب</button>
            </div>
            <div class="card">
                <h3>🎀 تأسيس حفل جديد</h3>
                <input id="c-name" placeholder="اسم المستخدم">
                <input id="c-pass" placeholder="كلمة المرور">
                <input id="c-event" placeholder="اسم المناسبة">
                <input id="c-host" placeholder="اسم الداعي">
                <input id="c-img" placeholder="رابط صورة الدعوة">
                <input id="c-map" placeholder="رابط الموقع">
                <button class="btn-gold" id="save-client">إنشاء الحساب</button>
            </div>
            <div class="card">
                <h3>📝 إضافة ضيوف</h3>
                <select id="client-select"></select>
                <input id="g-name" placeholder="اسم الضيف">
                <input id="g-phone" placeholder="الجوال (966...)">
                <button class="btn-gold" id="save-guest" style="background:#27ae60">إضافة للجدول</button>
            </div>
        </div>

        <div class="card" style="overflow-x:auto;">
            <h3 style="color:var(--black)">قائمة بأسماء الضيوف 📜</h3>
            <div id="data-table"></div>
            <button onclick="window.logout()" style="margin-top: 20px; background: #eee; color: #666;">تسجيل الخروج</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, where, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyBycODn3kTe7uRIBYifDogSPmv2towU6lA", projectId: "wedding-system-6fadd", appId: "1:902051092170:web:e228d3138a5b091b974633" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    // تحديث الرابط ليتوافق مع اليوزر نيم الجديد
    const BASE_URL = "https://ronaq-inv.github.io/wedding-system1/"; 

    const role = sessionStorage.getItem('role');
    const user = sessionStorage.getItem('user');

    // زر عرض صفحة العميل بناءً على السلكت
    document.getElementById('view-client-page').onclick = () => {
        const sel = document.getElementById('client-select').value;
        if(sel) window.open(`${BASE_URL}?user=${sel}`, '_blank');
        else alert("يرجى اختيار حفل أولاً");
    };

    // [دوال الـ Firebase والـ Logic المعتمد لم تتغير لضمان استقرار النظام]
    // ... (تكملة السكريبت المعتمد) ...
    
    // تسجيل الدخول
    document.getElementById('login-btn').onclick = async () => {
        const u = document.getElementById('user-input').value;
        const p = document.getElementById('pass-input').value;
        if(u === "admin" && p === "123456") { 
            sessionStorage.setItem('role','admin'); sessionStorage.setItem('user',u); location.reload(); 
        } else {
            const q = query(collection(db, "v30_data"), where("name","==",u), where("password","==",p));
            const snap = await getDocs(q);
            if(!snap.empty) { sessionStorage.setItem('role','client'); sessionStorage.setItem('user',u); location.reload(); }
            else alert("خطأ في بيانات الدخول");
        }
    };

    window.logout = () => { sessionStorage.clear(); location.reload(); };

    async function loadData(cl) {
        const cSnap = await getDocs(query(collection(db, "v30_data"), where("name", "==", cl)));
        let evName = ""; let host = ""; cSnap.forEach(cd => { evName = cd.data().event; host = cd.data().host; });

        const snap = await getDocs(query(collection(db, "v30_guests"), where("belongsTo", "==", cl)));
        let guestsArr = [];
        let h = `<table><tr><th>الاسم</th><th>الحالة</th><th>الإجراءات</th></tr>`;
        
        snap.forEach(d => {
            const g = d.data(); guestsArr.push(g);
            const msg = `أهلاً بك يا ${g.name} ✨\nنتشرف بدعوتكم لحضور ${evName}..\nللتأكيد عبر الرابط:\n${BASE_URL}?id=${d.id}\nالداعي: ${host}`;
            h += `<tr><td>${g.name}</td><td><span class="status-pill status-${g.status}">${g.status}</span></td>`;
            h += `<td><button onclick="window.sendToWA('${g.phone}', \`${msg}\`)" class="btn-wa">إرسال</button></td></tr>`;
        });
        document.getElementById('data-table').innerHTML = h + "</table>";
        document.getElementById('stat-total').innerText = guestsArr.length;
        document.getElementById('stat-yes').innerText = guestsArr.filter(g => g.status === 'حضور').length;
        document.getElementById('stat-no').innerText = guestsArr.filter(g => g.status === 'اعتذار').length;
    }

    async function init() {
        if(sessionStorage.getItem('role')) {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('dashboard-section').classList.remove('hidden');
            document.getElementById('welcome-msg').innerText = "لوحة تحكم: " + user;
            if(role === 'admin') {
                document.getElementById('admin-area').classList.remove('hidden');
                const s = await getDocs(collection(db, "v30_data"));
                const sel = document.getElementById('client-select');
                sel.innerHTML = "<option value=''>اختر الحفل...</option>";
                s.forEach(d => sel.innerHTML += `<option value="${d.data().name}">${d.data().name}</option>`);
                sel.onchange = () => loadData(sel.value);
            } else loadData(user);
        }
    }
    init();

    window.sendToWA = (phone, message) => {
        window.location.assign(`https://api.whatsapp.com/send?phone=${phone.replace(/\D/g, '')}&text=${encodeURIComponent(message)}`);
    };
</script>
</body>
</html>
